name: Run API Tests
description: Install dependencies and run API tests

inputs:
  env:
    description: Environment name (dev, stg, preprod, prod)
    required: true

runs:
  using: composite
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v4

    - name: Clone test repo
      uses: actions/checkout@v4
      with:
        repository: mtararujs/course-js-api-framework
        path: tests

    - name: Show test message
      shell: bash
      run: echo "Running tests for ${{ inputs.env }} environment..."

    - name: Install npm dependencies
      shell: bash
      run: npm install
      working-directory: tests

    - name: Run tests
      shell: bash
      run: npm run greetings greetings_${{ inputs.env }}
      working-directory: tests
