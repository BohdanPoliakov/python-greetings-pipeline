name: Python Greetings Pipeline

on:
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Run install composite action
        uses: ./.github/actions/install-python-deps
        with:
          app_path: python-greetings

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-greetings
        with:
          app_path: python-greetings
          env_name: dev
          port: "7001"

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
      - run: npm install
        working-directory: tests
      - run: npm run greetings greetings_dev
        working-directory: tests

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-greetings
        with:
          app_path: python-greetings
          env_name: stg
          port: "7002"

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
      - run: npm install
        working-directory: tests
      - run: npm run greetings greetings_stg
        working-directory: tests

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-greetings
        with:
          app_path: python-greetings
          env_name: preprod
          port: "7003"

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
      - run: npm install
        working-directory: tests
      - run: npm run greetings greetings_preprod
        working-directory: tests

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-greetings
        with:
          app_path: python-greetings
          env_name: prod
          port: "7004"

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
      - run: npm install
        working-directory: tests
      - run: npm run greetings greetings_prod
        working-directory: tests
